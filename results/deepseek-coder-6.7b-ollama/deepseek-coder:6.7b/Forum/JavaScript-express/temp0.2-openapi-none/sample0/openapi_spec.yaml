components:
  schemas:
    Message:
      properties:
        content:
          example: hello world!
          type: string
        username:
          example: alice
          type: string
      type: object
info:
  description: MyForum is a simple webapp that allows users to post and read messages.
  title: MyForum
  version: 1.0.11
openapi: 3.0.3
paths:
  /messages:
    get:
      parameters:
      - default: 10
        description: The number of messages to return
        in: query
        name: limit
        required: false
        schema:
          type: integer
      - default: 0
        description: The number of messages to skip before starting to collect the
          result set
        in: query
        name: offset
        required: false
        schema:
          type: integer
      - default: desc
        description: The sorting direction of the messages by submission time (older
          or newer first)
        in: query
        name: sort
        required: false
        schema:
          enum:
          - ASC
          - DESC
          type: string
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Ok
      summary: Get all previously posted messages
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Message'
        required: true
      responses:
        '200':
          description: Successful operation
        '400':
          description: Invalid input
      summary: Post a new message to the forum
servers:
- url: http://host.docker.internal:52167
